<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
<title id="title">Serkan Osman Çakmak GitHub profile banner</title>
<desc id="desc">Computer Engineering student learning Java and interested in backend development.</desc>
<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#030712"/>
    <stop offset="0.52" stop-color="#0F172A"/>
    <stop offset="1" stop-color="#030712"/>
    <animate attributeName="x1" values="0;0.15;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="1;0.85;1" dur="10s" repeatCount="indefinite"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7C3AED"/>
    <stop offset="0.5" stop-color="#22D3EE"/>
    <stop offset="1" stop-color="#10B981"/>
    <animate attributeName="x1" values="0;1;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="1;0;1" dur="8s" repeatCount="indefinite"/>
  </linearGradient>
  <radialGradient id="orb1"><stop stop-color="#22D3EE" stop-opacity="0.28"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
  <radialGradient id="orb2"><stop stop-color="#7C3AED" stop-opacity="0.28"/><stop offset="1" stop-color="#7C3AED" stop-opacity="0"/></radialGradient>
  <radialGradient id="orb3"><stop stop-color="#10B981" stop-opacity="0.28"/><stop offset="1" stop-color="#10B981" stop-opacity="0"/></radialGradient>
  <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff" stop-opacity=".14"/><stop offset=".35" stop-color="#fff" stop-opacity=".03"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient>
  <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7C3AED" stop-opacity=".15"/><stop offset=".5" stop-color="#22D3EE" stop-opacity=".9"/><stop offset="1" stop-color="#10B981" stop-opacity=".15"><animate attributeName="offset" values="1;.7;1" dur="4s" repeatCount="indefinite"/></stop></linearGradient>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.45"/></filter>
  <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="soft"><feGaussianBlur stdDeviation="22"/></filter>
  <filter id="noise" x="0" y="0" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" seed="9"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer></filter>
  <clipPath id="frameClip"><rect x="20" y="20" width="1140" height="570" rx="32"/></clipPath>
  <mask id="fadeLine"><rect width="100%" height="100%" fill="white"/><rect x="0" y="0" width="1180" height="70" fill="url(#scanFade)"/></mask>
  <linearGradient id="scanFade" x1="0" y1="0" x2="0" y2="1"><stop stop-color="white" stop-opacity="0"/><stop offset=".5" stop-color="white"/><stop offset="1" stop-color="white" stop-opacity="0"/></linearGradient>
</defs>

<rect width="1180" height="610" fill="url(#bgGrad)"/>
<g clip-path="url(#frameClip)">
  <circle cx="150" cy="80" r="210" fill="url(#orb2)" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0 0;35 18;0 0" dur="12s" repeatCount="indefinite"/></circle>
  <circle cx="1040" cy="120" r="190" fill="url(#orb1)" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0 0;-40 24;0 0" dur="14s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="560" r="230" fill="url(#orb3)" filter="url(#soft)"><animateTransform attributeName="transform" type="translate" values="0 0;20 -24;0 0" dur="16s" repeatCount="indefinite"/></circle>
  <rect x="0" y="0" width="1180" height="610" filter="url(#noise)" opacity=".55"/>
  <g fill="#22D3EE" opacity=".6">
    <circle cx="88" cy="120" r="1.7"><animate attributeName="cy" values="120;92;120" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="190" r="1.4"><animate attributeName="cy" values="190;160;190" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="500" r="1.8"><animate attributeName="cy" values="500;470;500" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="70" r="1.2"><animate attributeName="cy" values="70;48;70" dur="4.5s" repeatCount="indefinite"/></circle>
  </g>
</g>

<rect x="20" y="20" width="1140" height="570" rx="32" fill="#0F172A" fill-opacity=".78" stroke="#FFFFFF" stroke-opacity=".08" filter="url(#shadow)"/>
<rect x="21" y="21" width="1138" height="568" rx="31" fill="none" stroke="url(#borderGrad)" stroke-width="1.5" opacity=".9"/>
<path d="M55 50 H920 C1020 50 1090 96 1145 170 V50 Z" fill="url(#shine)" opacity=".7"/>

