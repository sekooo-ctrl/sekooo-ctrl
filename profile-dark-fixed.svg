<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
<title id="title">Serkan Osman Çakmak GitHub Profile Banner</title>
<desc id="desc">Computer Engineering student learning Java and backend development fundamentals.</desc>

<defs>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#030712"/>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>

  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7c3aed">
      <animate attributeName="stop-color" values="#7c3aed;#22d3ee;#10b981;#7c3aed" dur="9s" repeatCount="indefinite"/>
    </stop>
    <stop offset="48%" stop-color="#22d3ee">
      <animate attributeName="stop-color" values="#22d3ee;#10b981;#7c3aed;#22d3ee" dur="9s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#10b981">
      <animate attributeName="stop-color" values="#10b981;#7c3aed;#22d3ee;#10b981" dur="9s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>

  <linearGradient id="reflection" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffffff" stop-opacity=".14"/>
    <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <radialGradient id="orbPurple"><stop stop-color="#7c3aed" stop-opacity=".34"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
  <radialGradient id="orbCyan"><stop stop-color="#22d3ee" stop-opacity=".30"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
  <radialGradient id="orbGreen"><stop stop-color="#10b981" stop-opacity=".22"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></radialGradient>

  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity=".58"/>
  </filter>

  <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="8"/>
  </filter>

  <filter id="noiseFilter" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency=".72" numOctaves="2" seed="11" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 .075"/>
    </feComponentTransfer>
  </filter>

  <mask id="panelMask">
    <rect width="1180" height="610" fill="black"/>
    <rect x="34" y="34" width="1112" height="542" rx="32" fill="white"/>
  </mask>
<clipPath id="codeClip"><rect x="62" y="136" width="414" height="356" rx="0"/></clipPath>

  <path id="particlePath1" d="M0,0 C80,-30 140,35 220,0"/>
  <path id="particlePath2" d="M0,0 C-70,40 -130,-25 -210,5"/>
</defs>

<rect width="1180" height="610" rx="36" fill="url(#bgGrad)"/>

<!-- ambient gradients -->
<circle cx="125" cy="90" r="260" fill="url(#orbPurple)">
  <animateTransform attributeName="transform" type="translate" values="0 0;24 16;0 0" dur="12s" repeatCount="indefinite"/>
</circle>
<circle cx="1070" cy="510" r="270" fill="url(#orbCyan)">
  <animateTransform attributeName="transform" type="translate" values="0 0;-28 -18;0 0" dur="14s" repeatCount="indefinite"/>
</circle>
<circle cx="790" cy="80" r="180" fill="url(#orbGreen)">
  <animateTransform attributeName="transform" type="translate" values="0 0;18 12;0 0" dur="11s" repeatCount="indefinite"/>
</circle>

<g filter="url(#shadow)">
  <rect x="34" y="34" width="1112" height="542" rx="32" fill="#0f172a" fill-opacity=".91" stroke="#24324a"/>
  <rect x="35" y="35" width="1110" height="540" rx="31" fill="none" stroke="url(#accent)" stroke-width="1.4" stroke-dasharray="260 1600">
    <animate attributeName="stroke-dashoffset" values="0;-1860" dur="8s" repeatCount="indefinite"/>
  </rect>
</g>

<!-- noise -->
<rect x="34" y="34" width="1112" height="542" rx="32" filter="url(#noiseFilter)" mask="url(#panelMask)"/>

<!-- glass reflection sweep -->
<path d="M46 76 C260 22 480 46 660 92 C820 132 1000 130 1132 74 L1132 168 C920 222 700 206 510 160 C330 116 160 108 46 146Z"
      fill="url(#reflection)" opacity=".32">
  <animateTransform attributeName="transform" type="translate" values="-180 0;180 0;-180 0" dur="10s" repeatCount="indefinite"/>
</path>

<!-- LEFT TERMINAL -->
<g>
  <rect x="62" y="88" width="414" height="432" rx="24" fill="#0b1220" stroke="#24324a"/>
  <rect x="62" y="88" width="414" height="48" rx="24" fill="#0b1220"/>
  <rect x="62" y="88" width="414" height="48" rx="24" fill="url(#reflection)" opacity=".08"/>
  <circle cx="88" cy="112" r="6" fill="#fb7185"/>
  <circle cx="109" cy="112" r="6" fill="#fbbf24"/>
  <circle cx="130" cy="112" r="6" fill="#34d399"/>
  <text x="158" y="118" fill="#94a3b8" font-size="15" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">Main.java</text>
  <line x1="62" y1="136" x2="476" y2="136" stroke="#24324a"/>

  <g clip-path="url(#codeClip)" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="17">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -5;0 0" dur="6.5s" repeatCount="indefinite"/>

      <text x="86" y="177" fill="#8b5cf6" opacity="0">public class <tspan fill="#f8fafc">Main</tspan> {
        <animate attributeName="opacity" values="0;1;1" keyTimes="0;.08;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="104" y="211" fill="#8b5cf6" opacity="0">public static void <tspan fill="#22d3ee">main</tspan><tspan fill="#f8fafc">(String[] args) {</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.10;.22;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="123" y="245" fill="#8b5cf6" opacity="0">while <tspan fill="#f8fafc">(learning) {</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.22;.34;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="145" y="279" fill="#22d3ee" opacity="0">practice<tspan fill="#f8fafc">();</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.34;.46;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="145" y="313" fill="#22d3ee" opacity="0">buildProjects<tspan fill="#f8fafc">();</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.46;.58;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="145" y="347" fill="#22d3ee" opacity="0">improve<tspan fill="#f8fafc">();</tspan>
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.58;.70;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="123" y="381" fill="#f8fafc" opacity="0">}
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.70;.80;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="104" y="415" fill="#f8fafc" opacity="0">}
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.80;.88;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <text x="86" y="449" fill="#f8fafc" opacity="0">}
        <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.88;.94;1" dur="11s" repeatCount="indefinite"/>
      </text>
      <rect x="86" y="469" width="10" height="20" rx="2" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur=".82s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- terminal scanline -->
  <rect x="62" y="140" width="414" height="20" fill="#22d3ee" opacity=".04">
    <animate attributeName="y" values="140;498;140" dur="5.2s" repeatCount="indefinite"/>
  </rect>

  <line x1="78" y1="492" x2="460" y2="492" stroke="#24324a"/>
  <text x="84" y="511" fill="#94a3b8" font-size="13" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">LEARNING • BUILDING • IMPROVING</text>
</g>

<line x1="505" y1="92" x2="505" y2="518" stroke="#24324a"/>

<!-- RIGHT CONTENT -->
<g font-family="Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">
  <text x="544" y="126" fill="#94a3b8" font-size="23">Hi 👋</text>
  <text x="544" y="181" fill="#f8fafc" font-size="42" font-weight="760">I'm Serkan Osman Çakmak</text>
  <g transform="translate(544 199)">
    <text x="0" y="27" fill="url(#accent)" font-size="24" font-weight="730">
      Computer Engineering Student
    </text>
    <text x="0" y="57" fill="#94a3b8" font-size="16" font-weight="620">
      Learning Java · Interested in Backend Development
    </text>
    <rect x="0" y="70" width="382" height="2" rx="1" fill="url(#accent)" opacity=".65">
      <animate attributeName="width" values="110;382;110" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".35;.75;.35" dur="5.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- sequential info reveal -->
  <g>
    <g transform="translate(544 292)" opacity="0">
      <animate attributeName="opacity" values="0;1;1" keyTimes="0;.18;1" dur="5s" repeatCount="indefinite"/>
      <circle cx="6" cy="0" r="4.7" fill="#22d3ee" filter="url(#glow)"/>
      <text x="24" y="5" fill="#94a3b8" font-size="13" font-weight="800" letter-spacing="1.8">LOCATION</text>
      <text x="190" y="5" fill="#f8fafc" font-size="17" font-weight="650">Sakarya, Türkiye</text>
    </g>
    <g transform="translate(544 337)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.18;.34;1" dur="5s" repeatCount="indefinite"/>
      <circle cx="6" cy="0" r="4.7" fill="#22d3ee" filter="url(#glow)"/>
      <text x="24" y="5" fill="#94a3b8" font-size="13" font-weight="800" letter-spacing="1.8">EDUCATION</text>
      <text x="190" y="5" fill="#f8fafc" font-size="17" font-weight="650">Sakarya University · Computer Engineering</text>
    </g>
    <g transform="translate(544 382)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.34;.50;1" dur="5s" repeatCount="indefinite"/>
      <circle cx="6" cy="0" r="4.7" fill="#22d3ee" filter="url(#glow)"/>
      <text x="24" y="5" fill="#94a3b8" font-size="13" font-weight="800" letter-spacing="1.8">FOCUS</text>
      <text x="190" y="5" fill="#f8fafc" font-size="17" font-weight="650">Java &amp; Backend Fundamentals</text>
    </g>
    <g transform="translate(544 427)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;.50;.66;1" dur="5s" repeatCount="indefinite"/>
      <circle cx="6" cy="0" r="4.7" fill="#22d3ee" filter="url(#glow)"/>
      <text x="24" y="5" fill="#94a3b8" font-size="13" font-weight="800" letter-spacing="1.8">EMAIL</text>
      <text x="190" y="5" fill="#f8fafc" font-size="17" font-weight="650">osmanserkan22cakmak@gmail.com</text>
    </g>
  </g>

  <text x="544" y="470" fill="#94a3b8" font-size="13" font-weight="850" letter-spacing="2.1">CURRENT TOOLKIT</text>

  <!-- animated skill pills -->
  <g font-size="14" font-weight="760">
    <g transform="translate(544 490)">
      <animateTransform attributeName="transform" additive="sum" type="scale" values="1;1.035;1" dur="3.6s" repeatCount="indefinite"/>
      <rect width="136" height="42" rx="21" fill="#0b1220" stroke="#24324a"/>
      <rect width="136" height="42" rx="21" fill="url(#accent)" opacity=".10">
        <animate attributeName="opacity" values=".08;.18;.08" dur="3.6s" repeatCount="indefinite"/>
      </rect>
      <text x="68" y="27" text-anchor="middle" fill="#f8fafc">Java · Learning</text>
    </g>
    <g transform="translate(694 490)">
      <animateTransform attributeName="transform" additive="sum" type="scale" values="1;1.03;1" dur="4s" begin=".4s" repeatCount="indefinite"/>
      <rect width="112" height="42" rx="21" fill="#0b1220" stroke="#24324a"/>
      <rect width="112" height="42" rx="21" fill="url(#accent)" opacity=".10">
        <animate attributeName="opacity" values=".08;.17;.08" dur="4s" begin=".4s" repeatCount="indefinite"/>
      </rect>
      <text x="56" y="27" text-anchor="middle" fill="#f8fafc">C# · Basic</text>
    </g>
    <g transform="translate(820 490)">
      <animateTransform attributeName="transform" additive="sum" type="scale" values="1;1.03;1" dur="4.2s" begin=".8s" repeatCount="indefinite"/>
      <rect width="120" height="42" rx="21" fill="#0b1220" stroke="#24324a"/>
      <rect width="120" height="42" rx="21" fill="url(#accent)" opacity=".10">
        <animate attributeName="opacity" values=".08;.17;.08" dur="4.2s" begin=".8s" repeatCount="indefinite"/>
      </rect>
      <text x="60" y="27" text-anchor="middle" fill="#f8fafc">C++ · Basic</text>
    </g>
    <g transform="translate(954 490)">
      <animateTransform attributeName="transform" additive="sum" type="scale" values="1;1.03;1" dur="4.4s" begin="1.2s" repeatCount="indefinite"/>
      <rect width="116" height="42" rx="21" fill="#0b1220" stroke="#24324a"/>
      <rect width="116" height="42" rx="21" fill="url(#accent)" opacity=".10">
        <animate attributeName="opacity" values=".08;.17;.08" dur="4.4s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
      <text x="58" y="27" text-anchor="middle" fill="#f8fafc">SQL · Basic</text>
    </g>
  </g>
</g>

<!-- animateMotion particles -->
<g fill="#22d3ee" opacity=".55">
  <circle r="2.2"><animateMotion dur="7s" repeatCount="indefinite" path="M880 116 C950 88 1040 104 1110 86"/></circle>
  <circle r="1.8"><animateMotion dur="8.5s" begin="1s" repeatCount="indefinite" path="M1060 500 C990 530 900 512 835 540"/></circle>
  <circle r="1.6"><animateMotion dur="9s" begin=".5s" repeatCount="indefinite" path="M520 548 C610 520 690 550 770 520"/></circle>
</g>

</svg>